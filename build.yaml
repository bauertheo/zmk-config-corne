# GitHub Actions build matrix.
---
include:
  - board: nice_nano_v2
    shield: corne_tp_left
  - board: nice_nano_v2
    shield: corne_tp_right

  # Settings reset firmware — flash either half with this to wipe BLE pairings
  # and stored configs. Useful when split halves stop pairing. See:
  # https://zmk.dev/docs/troubleshooting#split-keyboard-halves-unable-to-pair
  - board: nice_nano_v2
    shield: settings_reset
