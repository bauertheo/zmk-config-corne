# RGB underglow removed — pin P0.06 (D1) is now PS/2 SCL on the right half.
# CONFIG_ZMK_RGB_UNDERGLOW=n  (default n; explicit n unnecessary)
# CONFIG_WS2812_STRIP=n

# No OLED on this build.
# CONFIG_ZMK_DISPLAY=n

# Pointer / mouse keys (ZMK_POINTING is upstream-only; the infused-kim
# mouse PR fork uses ZMK_MOUSE alone)
CONFIG_ZMK_MOUSE=y

# Encoders — without TRIGGER_GLOBAL_THREAD the EC11 driver loads but never
# raises sensor events on rotation, so the keymap's sensor-bindings never fire.
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Higher BT TX power for stronger split link in noisy 2.4 GHz environments
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Power management
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# USB logging — verbose for current encoder/TP debugging. Set
# CONFIG_ZMK_LOGGING_MINIMAL=y once everything works.
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=3000
